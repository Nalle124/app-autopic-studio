<html lang="sv" class="dark">
  <head>
    <meta charset="UTF-8" />

    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AutoPic" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/manifest.json" />
    
    <title>AutoPic - Professionella bilbakgrunder på sekunder</title>
    <meta name="description" content="Skapa proffsiga bilannonser med AI-driven bildkomposition. Byt bakgrund, lägg till skuggor och reflektioner automatiskt för svenska bilhandlare." />
    <meta name="author" content="AutoPic" />

    <meta property="og:title" content="AutoPic - Professionella bilbakgrunder på sekunder" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body class="safe-area-padding">
    <div id="splash-screen" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, hsl(220,27%,12%) 0%, hsl(220,27%,22%) 50%, hsl(220,20%,30%) 100%);transition:opacity 0.4s ease-out,visibility 0.4s ease-out;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;animation:splash-pulse 1.8s ease-in-out infinite;">
        <img src="/favicon.png" alt="" width="56" height="56" style="filter:brightness(0) invert(1);opacity:0.95;" />
        <div style="width:32px;height:2px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;">
          <div style="width:100%;height:100%;background:rgba(255,255,255,0.6);animation:splash-load 1.2s ease-in-out infinite;transform-origin:left;"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes splash-pulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
      @keyframes splash-load{0%{transform:scaleX(0)}50%{transform:scaleX(1)}100%{transform:scaleX(0);transform-origin:right}}
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
